# Default-deny DNS allow-list for GitHub Codespaces egress control.
# dnsmasq matches the MOST specific rule, so address=/#/0.0.0.0 (least
# specific) blocks every domain that is not explicitly allow-listed below.

no-resolv
bind-interfaces
listen-address=127.0.0.1

# --- Allow-list: forward ONLY these domains to an upstream resolver ---------
# Codespaces control-plane (required or the codespace connection breaks):
server=/github.com/1.1.1.1
server=/githubusercontent.com/1.1.1.1
server=/github.dev/1.1.1.1
server=/visualstudio.com/1.1.1.1
# GitHub authentication and API (required for extensions):
server=/api.github.com/1.1.1.1
server=/token.dev.github.com/1.1.1.1
server=/auth.github.com/1.1.1.1
# Package registries / OS repos (edit to taste):
server=/ubuntu.com/1.1.1.1
server=/debian.org/1.1.1.1
server=/npmjs.org/1.1.1.1
server=/pypi.org/1.1.1.1
server=/pythonhosted.org/1.1.1.1
server=/nodejs.org/1.1.1.1
server=/npm.org/1.1.1.1
server=/registry.npmjs.org/1.1.1.1
# VS Code extensions and marketplace:
server=/marketplace.visualstudio.com/1.1.1.1
server=/vscode-cdn.azureedge.net/1.1.1.1
server=/embeddings.vscode-cdn.net/1.1.1.1
server=/az764295.vo.msecnd.net/1.1.1.1
server=/download.visualstudio.microsoft.com/1.1.1.1
# Additional package manager domains:
server=/archive.ubuntu.com/1.1.1.1
server=/deb.debian.org/1.1.1.1
server=/files.pythonhosted.org/1.1.1.1
server=/dl.node-arm.com/1.1.1.1
# --- Everything else is blocked (resolves to 0.0.0.0) -----------------------
address=/#/0.0.0.0
